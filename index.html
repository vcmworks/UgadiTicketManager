<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ugadi Ticket Manager | TAB Bremen</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root { 
            --primary-green: #27ae60; 
            --deep-green: #1e8449; 
            --saffron-yellow: #f1c40f; 
            --cream-bg: #FFFDD0; 
        }
        
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--cream-bg); margin: 0; padding-bottom: 50px; color: #333; }
        
        /* UI Styles */
        .app-header { background: var(--deep-green); padding: 15px; text-align: center; border-bottom: 5px solid var(--saffron-yellow); color: var(--saffron-yellow); }
        .app-header h1 { margin: 5px 0; font-size: 1.8rem; text-transform: uppercase; }
        .tab-nav { display: flex; justify-content: center; background: white; padding: 10px; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #eee; }
        .tab-btn.active { background: var(--primary-green); color: var(--saffron-yellow); }
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 6px solid var(--primary-green); margin-bottom: 20px; }
        .search-box { position: relative; margin: 15px 0; }
        #nameSearch { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        #suggestions { position: absolute; width: 100%; background: white; border: 1px solid #ddd; max-height: 180px; overflow-y: auto; z-index: 100; display: none; }
        .suggestion-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }

        /* PDF Styles - Table based for maximum compatibility */
        #pdf-export-area { 
            background: white; 
            width: 700px; 
            padding: 20px; 
            margin: 0 auto; 
            color: #000;
        }
        
        .ticket-table { 
            width: 100%; 
            border: 3px solid #27ae60; 
            border-collapse: collapse; 
            border-radius: 12px; 
            overflow: hidden;
            background: #ffffff;
        }

        .ticket-main-td { 
            padding: 20px; 
            border-right: 2px dashed #27ae60; 
            vertical-align: top;
            width: 70%;
        }

        .ticket-stub-td { 
            padding: 10px; 
            background: #f9fff9; 
            text-align: center; 
            vertical-align: middle;
            width: 30%;
        }

        .event-title { color: #1e8449; margin: 0; font-size: 22px; font-weight: 800; }
        .year-name { color: #d35400; font-weight: bold; font-size: 13px; margin-bottom: 10px; }
        .guest-name { font-size: 28px; font-weight: 900; margin: 10px 0; color: #222; border-left: 6px solid #f1c40f; padding-left: 12px; }
        .id-badge { background: #1e8449; color: #f1c40f; padding: 4px 12px; border-radius: 4px; display: inline-block; font-family: monospace; font-weight: bold; }
        .venue-box { background: #fdfae6; padding: 10px; border-radius: 8px; border: 1px solid #f1c40f; margin-top: 15px; font-size: 13px; }

        .flyer-row { text-align: center; padding-top: 25px; }
        .flyer-row img { width: 60%; border-radius: 8px; border: 1px solid #ddd; }
        
        .footer-note { text-align: center; font-size: 12px; color: #666; padding-top: 15px; }
    </style>
</head>
<body>

<div class="app-header">
    <img src="tablogo.jpg" style="height: 50px;" alt="Logo">
    <h1>Ugadi Ticket Manager 2026</h1>
</div>

<div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('gen-view', this)">🎟️ Ticket Generator</button>
    <button class="tab-btn" onclick="switchTab('scan-view', this)">🔍 Scanner</button>
</div>

<div class="container">
    <div id="gen-view" class="view">
        <div class="card">
            <label><b>1. Load MyData.csv</b></label><br>
            <input type="file" id="csvFile" accept=".csv" style="margin-top:10px;">
            <div class="search-box">
                <label><b>2. Search Guest</b></label>
                <input type="text" id="nameSearch" placeholder="Enter name...">
                <div id="suggestions"></div>
            </div>
        </div>

        <div id="preview-section" style="display:none;">
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h3 style="margin:0;">Ticket Preview</h3>
                    <button onclick="generatePDF()" class="tab-btn active">Download PDF</button>
                </div>

                <div id="pdf-export-area">
                    <table class="ticket-table">
                        <tr>
                            <td class="ticket-main-td">
                                <div class="event-title">UGADI SAMBARALU 2026</div>
                                <div class="year-name">Sri Parabhava Nama Samvatsaram</div>
                                <div style="font-size: 10px; color: #777;">GUEST NAME</div>
                                <div class="guest-name" id="out-name">---</div>
                                <div class="id-badge" id="out-id">ID-0000</div>
                                <div class="venue-box">
                                    <strong>📍 Korbhauser Weg 1, 28279 Bremen</strong><br>
                                    📅 21.03.2026 | 🕒 15:00 - 21:00
                                </div>
                            </td>
                            <td class="ticket-stub-td">
                                <div id="qrcode"></div>
                                <div style="font-size: 12px; font-weight: bold; color: #1e8449; margin-top: 10px;">ENTRY PASS</div>
                                <div id="out-counts" style="font-size: 11px; color: #555; margin-top: 5px;">---</div>
                            </td>
                        </tr>
                    </table>

                    <div class="flyer-row">
                        <img src="Flyer.jpg" alt="Flyer">
                    </div>

                    <div class="footer-note">
                        Present this QR code at the entrance. We look forward to seeing you!
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let localDb = [];
    const qrcode = new QRCode(document.getElementById("qrcode"), { width: 140, height: 140 });

    function switchTab(viewId, btn) {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(viewId).style.display = 'block';
        btn.classList.add('active');
    }

    document.getElementById('csvFile').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            localDb = event.target.result.split('\n').map(row => 
                row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim())
            ).filter(r => r.length > 1);
        };
        reader.readAsText(e.target.files[0]);
    });

    document.getElementById('nameSearch').addEventListener('input', function(e) {
        const val = e.target.value.toLowerCase();
        const sugg = document.getElementById('suggestions');
        sugg.innerHTML = '';
        if(val.length < 2) { sugg.style.display = 'none'; return; }
        
        const matches = localDb.filter(r => r[1] && r[1].toLowerCase().includes(val));
        if(matches.length > 0) {
            sugg.style.display = 'block';
            matches.slice(0, 5).forEach(m => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.innerText = m[1];
                div.onclick = () => {
                    document.getElementById('preview-section').style.display = 'block';
                    document.getElementById('out-name').innerText = m[1].toUpperCase();
                    document.getElementById('out-id').innerText = m[10];
                    document.getElementById('out-counts').innerText = `A:${m[4]} S:${m[5]} K:${parseInt(m[6])+parseInt(m[7])}`;
                    qrcode.makeCode(`VALID|${m[10]}|${m[1]}|T:${parseInt(m[4])+parseInt(m[5])+parseInt(m[6])+parseInt(m[7])}`);
                    document.getElementById('nameSearch').value = m[1];
                    sugg.style.display = 'none';
                };
                sugg.appendChild(div);
            });
        }
    });

    function generatePDF() {
        const element = document.getElementById('pdf-export-area');
        const name = document.getElementById('out-name').innerText;
        const opt = {
            margin: 10,
            filename: `UgadiTicket_${name}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true, letterRendering: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }
</script>

</body>
</html>
